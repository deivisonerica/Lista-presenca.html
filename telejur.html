<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequência Telejur - Juruti</title>
    <style>
        :root { --primary: #007bff; --secondary: #25D366; --bg: #f4f7f6; --white: #ffffff; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg); padding: 15px; display: flex; justify-content: center; margin: 0; }
        .container { width: 100%; max-width: 450px; background: var(--white); padding: 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); position: relative; box-sizing: border-box; min-height: 580px; overflow: hidden; display: flex; flex-direction: column; }
        .header-area { text-align: center; margin-bottom: 15px; width: 100%; }
        .titulo-principal { color: var(--primary); font-size: 20px; font-weight: 800; text-transform: uppercase; margin: 0; }
        .sub-titulo { color: var(--primary); font-size: 15px; font-weight: 600; margin: 5px 0 10px 0; }
        .btn-gps { background: #f8f9fa; border: 1px solid #e2e8f0; padding: 10px; border-radius: 16px; margin: 0 auto 15px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; width: 90%; min-height: 70px; box-sizing: border-box; }
        .btn-gps span { font-size: 16px; font-weight: 800; color: #2d3748; font-family: monospace; }
        .item-lista { display: flex; align-items: center; justify-content: space-between; padding: 12px 10px; border-bottom: 1px solid #f8fafc; }
        select, input[type="text"] { width: 100%; font-size: 16px; border-radius: 12px; border: 1.5px solid #e2e8f0; padding: 12px; margin-bottom: 12px; box-sizing: border-box; outline: none; }
        .select-tipo { border: 2px solid var(--primary); background-color: #f0f7ff; font-weight: bold; color: var(--primary); }
        .hidden { display: none !important; }
        button.enviar { width: 100%; background: linear-gradient(135deg, #25D366 0%, #128C7E 100%); color: white; border: none; padding: 18px; font-size: 18px; border-radius: 16px; cursor: pointer; font-weight: 700; box-shadow: 0 8px 15px rgba(37, 211, 102, 0.2); }
        #tela-sucesso { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; z-index: 100; padding: 30px; box-sizing: border-box; }
        .progress-bar { width: 150px; height: 4px; background: #eee; border-radius: 2px; margin-top: 15px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--secondary); width: 0%; transition: width 3s linear; }
    </style>
</head>
<body>

<div class="container">
    <div id="tela-sucesso" class="hidden">
        <h1 style="font-size: 60px; margin: 0;">✅</h1>
        <h2 style="color: #2d3748; margin: 10px 0;">Registrado com sucesso</h2>
        <p id="msg-agradecimento" style="font-size: 18px; color: #718096; font-weight: 600;"></p>
        <div class="progress-bar"><div id="fill" class="progress-fill"></div></div>
    </div>

    <div id="interface-usuario">
        <div class="header-area">
            <button onclick="abrirGestao()" style="background:none; border:none; color:var(--primary); font-size:11px; font-weight:bold; cursor:pointer">⚙️ GESTÃO DE EQUIPE</button>
            <h1 class="titulo-principal">Frequência Telejur</h1>
            <p class="sub-titulo">Unidade Juruti</p>
        </div>

        <select id="modo-envio" onchange="alternarModo()">
            <option value="geral">Lista Geral (Equipe)</option>
            <option value="individual">Individual (Validar Local)</option>
        </select>

        <div id="status-gps" class="btn-gps hidden">
            <b id="txt-local">⌛ Localizando...</b>
            <span id="relogio-agora">00:00:00</span>
            <small id="txt-data">--/--/----</small>
        </div>

        <div id="campos-individual" class="hidden">
            <select id="select-individual"></select>
            <select id="tipo-registro-individual" class="select-tipo">
                <option value="Registro de Chegada">🏁 Registro de Chegada</option>
                <option value="Início Almoço">🍴 Início Almoço</option>
                <option value="Saída Almoço">🍱 Saída Almoço</option>
                <option value="Final de Turno">🚪 Final de Turno</option>
            </select>
        </div>

        <div id="campos-geral">
            <div id="corpo-lista" style="max-height: 280px; overflow-y: auto; border: 1px solid #f0f0f0; border-radius: 12px;">Carregando equipe...</div>
        </div>

        <button id="btn-principal" class="enviar" onclick="processarEnvio()" style="margin-top: 20px;">🚀 Enviar Frequência</button>
    </div>

    <div id="secao-gestao" class="hidden">
        <h3 style="text-align:center;">Painel Administrativo</h3>
        <input type="text" id="novo-nome" placeholder="Nome do funcionário...">
        <button onclick="addFuncionario()" style="width:100%; background:var(--primary); color:white; border:none; padding:15px; border-radius:12px; font-weight:bold;">+ ADICIONAR</button>
        <div id="lista-admin" style="max-height: 200px; overflow-y: auto; margin-top:15px; border:1px solid #eee;"></div>
        <button onclick="fecharGestao()" style="width:100%; background:#718096; color:white; border:none; padding:12px; border-radius:12px; margin-top:10px;">VOLTAR</button>
    </div>
</div>

<script>
    const URL_GOOGLE = "COLOQUE_SUA_URL_AQUI"; 
    let equipe = [];
    let watchID = null;
    let timerID = null;
    let dadosLoc = { link: "", unidadeMsg: "FORA DA PLANTA", horaEnvio: "" };

    // Coordenadas atualizadas para o Beneficiamento
    const locais = { porto: { lat: -2.1677, lon: -56.1017 }, beneficiamento: { lat: -2.5116, lon: -56.1678 } };

    function iniciarRelogio() {
        if (timerID) clearInterval(timerID);
        timerID = setInterval(() => {
            const agora = new Date();
            const h = agora.toLocaleTimeString('pt-BR');
            document.getElementById('relogio-agora').innerText = h;
            document.getElementById('txt-data').innerText = agora.toLocaleDateString('pt-BR');
            dadosLoc.horaEnvio = h;
        }, 1000);
    }

    function iniciarRastreioGps() {
        if (!navigator.geolocation) return;
        watchID = navigator.geolocation.watchPosition((pos) => {
            const lat = pos.coords.latitude; 
            const lon = pos.coords.longitude;
            // Link de mapas conforme solicitado
            dadosLoc.link = `https://www.google.com/maps?q=${lat},${lon}`;
            
            const distPorto = calcularDistancia(lat, lon, locais.porto.lat, locais.porto.lon);
            const distBenef = calcularDistancia(lat, lon, locais.beneficiamento.lat, locais.beneficiamento.lon);
            const txtLocal = document.getElementById('txt-local');
            
            if (distPorto < 1500) { 
                dadosLoc.unidadeMsg = "ALCOA PORTO"; 
                txtLocal.innerHTML = "✅ PORTO"; 
            } else if (distBenef < 2500) { 
                dadosLoc.unidadeMsg = "ALCOA BENEFICIAMENTO"; 
                txtLocal.innerHTML = "✅ BENEFICIAMENTO"; 
            } else { 
                dadosLoc.unidadeMsg = "FORA DA PLANTA"; 
                txtLocal.innerHTML = "🛑 FORA DA PLANTA"; 
            }
        }, null, { enableHighAccuracy: true });
    }

    function calcularDistancia(lat1, lon1, lat2, lon2) {
        const R = 6371e3; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function atualizarDados() {
        chamadaAPI("acao=ler", (data) => {
            equipe = Array.isArray(data) ? data : [];
            const listaDiv = document.getElementById('corpo-lista');
            const selInd = document.getElementById('select-individual');
            const listaAdm = document.getElementById('lista-admin');
            listaDiv.innerHTML = ""; selInd.innerHTML = ""; listaAdm.innerHTML = "";
            equipe.forEach((nome, i) => {
                listaDiv.innerHTML += `<div class="item-lista"><span>${nome}</span><input type="checkbox" id="check-${i}" checked onchange="monitorar()" style="width:24px; height:24px;"><select id="motivo-${i}" class="hidden" style="width:140px;"><option value="Falta">Falta</option><option value="Base Telejur">Base Telejur</option></select></div>`;
                selInd.innerHTML += `<option value="${nome}">${nome}</option>`;
                listaAdm.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">${nome} <button onclick="deletarFuncionario('${nome}')">🗑️</button></div>`;
            });
        });
    }

    function alternarModo() {
        const modo = document.getElementById('modo-envio').value;
        document.getElementById('campos-geral').classList.toggle('hidden', modo === 'individual');
        document.getElementById('campos-individual').classList.toggle('hidden', modo === 'geral');
        document.getElementById('status-gps').classList.toggle('hidden', modo === 'geral');
        if (modo === 'individual') { iniciarRelogio(); iniciarRastreioGps(); }
        else { if(watchID) navigator.geolocation.clearWatch(watchID); }
    }

    function processarEnvio() {
        const modo = document.getElementById('modo-envio').value;
        let msg = "", params = "", nomeF = "";

        if (modo === "individual") {
            nomeF = document.getElementById('select-individual').value;
            const tipo = document.getElementById('tipo-registro-individual').value;
            msg = `*FREQUÊNCIA INDIVIDUAL - TELEJUR*\n👤 *Mot:* ${nomeF}\n📝 *Tipo:* ${tipo}\n🏢 *Status:* ${dadosLoc.unidadeMsg}\n📍 *Local:* ${dadosLoc.link}`;
            params = `acao=salvar_ponto&nome=${encodeURIComponent(nomeF)}&tipo=${encodeURIComponent(tipo)}&local=${encodeURIComponent(dadosLoc.unidadeMsg)}&link=${encodeURIComponent(dadosLoc.link)}`;
        } else {
            nomeF = "Equipe";
            let p = [], f = [];
            equipe.forEach((n, i) => {
                if (document.getElementById(`check-${i}`).checked) p.push(`_${n}_`);
                else f.push(`_${n}_ (${document.getElementById(`motivo-${i}`).value})`);
            });
            msg = `*LISTA FREQUÊNCIA - TELEJUR*\n✅ Presentes: ${p.length}\n❌ Ausentes: ${f.length}\n\n${p.join('\n')}\n\n*AUSENTES:*\n${f.join('\n')}`;
            params = `acao=salvar_ponto&nome=Equipe&tipo=Lista Geral&local=Planta&link=N/A`;
        }

        chamadaAPI(params, () => {
            document.getElementById('msg-agradecimento').innerText = `Obrigado, ${nomeF}`;
            document.getElementById('tela-sucesso').classList.remove('hidden');
            setTimeout(() => { document.getElementById('fill').style.width = "100%"; }, 50);
            setTimeout(() => { window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(msg)); location.reload(); }, 3000);
        });
    }

    function chamadaAPI(params, cb) {
        const id = 'jsonp_' + Date.now();
        window[id] = (d) => { cb(d); delete window[id]; document.getElementById(id).remove(); };
        const s = document.createElement('script'); s.id = id;
        s.src = `${URL_GOOGLE}?${params}&callback=${id}`;
        document.body.appendChild(s);
    }

    function monitorar() {
        equipe.forEach((_, i) => { document.getElementById(`motivo-${i}`).classList.toggle('hidden', document.getElementById(`check-${i}`).checked); });
    }

    function abrirGestao() { if(prompt("Senha:") === "123") { document.getElementById('interface-usuario').classList.add('hidden'); document.getElementById('secao-gestao').classList.remove('hidden'); } }
    function fecharGestao() { location.reload(); }
    function addFuncionario() { const n = document.getElementById('novo-nome').value; chamadaAPI(`acao=add&nome=${encodeURIComponent(n)}&senha=123`, atualizarDados); }
    function deletarFuncionario(n) { if(confirm("Remover?")) chamadaAPI(`acao=deletar&nome=${encodeURIComponent(n)}&senha=123`, atualizarDados); }

    window.onload = atualizarDados;
</script>
</body>
</html>
