<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequência Telejur - Juruti</title>
    <style>
        :root { --primary: #007bff; --secondary: #25D366; --bg: #f4f7f6; --white: #ffffff; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg); padding: 15px; display: flex; justify-content: center; margin: 0; }
        .container { width: 100%; max-width: 450px; background: var(--white); padding: 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); position: relative; box-sizing: border-box; min-height: 550px; overflow: hidden; }
        .header-area { text-align: center; margin-bottom: 20px; }
        .titulo-principal { color: var(--primary); font-size: 20px; font-weight: 800; text-transform: uppercase; margin: 0; }
        .sub-titulo { color: var(--primary); font-size: 15px; font-weight: 600; margin: 5px 0 10px 0; }
        .btn-admin-top { display: inline-block; background: rgba(0, 123, 255, 0.1); color: var(--primary); border: 1px solid rgba(0, 123, 255, 0.2); padding: 6px 12px; border-radius: 10px; font-size: 10px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .item-lista { display: flex; align-items: center; justify-content: space-between; padding: 12px 10px; border-bottom: 1px solid #f8fafc; }
        .nome-func { font-size: 14px; font-weight: 500; }
        select, input[type="text"] { width: 100%; font-size: 14px; border-radius: 12px; border: 1.5px solid #e2e8f0; padding: 12px; margin-bottom: 12px; box-sizing: border-box; }
        .hidden { display: none !important; }
        .btn-gps { background: #f8f9fa; border: 1px solid #e2e8f0; padding: 15px; border-radius: 16px; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; width: 100%; box-sizing: border-box; min-height: 90px; }
        button.enviar { width: 100%; background: linear-gradient(135deg, #25D366 0%, #128C7E 100%); color: white; border: none; padding: 18px; font-size: 16px; border-radius: 16px; cursor: pointer; font-weight: 700; box-shadow: 0 8px 15px rgba(37, 211, 102, 0.2); }
        
        #tela-sucesso { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; z-index: 100; padding: 30px; box-sizing: border-box; }
        .progress-bar { width: 150px; height: 4px; background: #eee; border-radius: 2px; margin-top: 15px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--secondary); width: 0%; transition: width 3s linear; }
    </style>
</head>
<body>

<div class="container">
    <div id="tela-sucesso" class="hidden">
        <h1 style="font-size: 60px; margin: 0;">✅</h1>
        <h2 style="color: #2d3748; margin: 10px 0;">Registrado com sucesso</h2>
        <p id="msg-agradecimento" style="font-size: 18px; color: #718096; font-weight: 600;"></p>
        <p style="font-size: 11px; color: #a0aec0; margin-top: 20px;">Abrindo WhatsApp em 3 segundos...</p>
        <div class="progress-bar"><div id="fill" class="progress-fill"></div></div>
    </div>

    <div id="interface-usuario">
        <div class="header-area">
            <button class="btn-admin-top" onclick="abrirGestao()">⚙️ GESTÃO DE EQUIPE</button>
            <h1 class="titulo-principal">Frequência Funcionário Telejur</h1>
            <p class="sub-titulo">Unidade Juruti</p>
        </div>

        <select id="modo-envio" onchange="alternarModo()">
            <option value="geral">Lista Geral (Equipe)</option>
            <option value="individual">Individual (Validar Local)</option>
        </select>

        <div id="status-gps" class="btn-gps hidden">⌛ Localizando posição...</div>

        <div id="campos-individual" class="hidden">
            <select id="select-individual"></select>
        </div>

        <div id="campos-geral">
            <div id="corpo-lista" style="max-height: 300px; overflow-y: auto;">Carregando equipe...</div>
        </div>

        <button id="btn-principal" class="enviar" onclick="processarEnvio()" style="margin-top: 20px;">🚀 Enviar lista de frequencia</button>
    </div>
</div>

<script>
    const URL_GOOGLE = "https://script.google.com/macros/s/AKfycbxcDhXRYVo_Nn3VkFzHg9cq_rqUJZ1Ll9PcQzoIeOgt5VHxaQot1noJbyg5nKJSg6yW/exec";
    let equipe = [];
    let dadosLoc = { link: "", unidadeMsg: "FORA DA PLANTA", hora: "" };

    // Coordenadas Alcoa Juruti
    const locais = {
        porto: { lat: -2.1677, lon: -56.1017, nome: "ALCOA PORTO" },
        beneficiamento: { lat: -2.3166, lon: -56.2415, nome: "ALCOA BENEFICIAMENTO" }
    };

    function emitirBip() {
        try {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const osc = context.createOscillator();
            const gain = context.createGain();
            osc.frequency.setValueAtTime(880, context.currentTime);
            gain.gain.setValueAtTime(0.1, context.currentTime);
            osc.connect(gain); gain.connect(context.destination);
            osc.start(); osc.stop(context.currentTime + 0.15);
        } catch(e) {}
    }

    // Cálculo de distância para definir se está na planta
    function calcularDistancia(lat1, lon1, lat2, lon2) {
        const R = 6371e3; 
        const φ1 = lat1 * Math.PI/180;
        const φ2 = lat2 * Math.PI/180;
        const Δφ = (lat2-lat1) * Math.PI/180;
        const Δλ = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    async function obterGps() {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition((pos) => {
            const lat = pos.coords.latitude; const lon = pos.coords.longitude;
            dadosLoc.hora = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            dadosLoc.link = `https://www.google.com/maps?q=${lat},${lon}`;
            
            const distPorto = calcularDistancia(lat, lon, locais.porto.lat, locais.porto.lon);
            const distBenef = calcularDistancia(lat, lon, locais.beneficiamento.lat, locais.beneficiamento.lon);

            const statusGps = document.getElementById('status-gps');
            if (distPorto < 1000) {
                dadosLoc.unidadeMsg = "PRESENTE NA ALCOA PORTO";
                statusGps.innerHTML = `<span style="color:#2c7a7b; font-weight:bold;">✅ ALCOA PORTO</span><small>Localização validada</small>`;
                statusGps.style.backgroundColor = "#e6fffa";
            } else if (distBenef < 2500) {
                dadosLoc.unidadeMsg = "PRESENTE NA ALCOA BENEFICIAMENTO";
                statusGps.innerHTML = `<span style="color:#2c7a7b; font-weight:bold;">✅ ALCOA BENEFICIAMENTO</span><small>Localização validada</small>`;
                statusGps.style.backgroundColor = "#e6fffa";
            } else {
                dadosLoc.unidadeMsg = "FORA DA PLANTA";
                statusGps.innerHTML = `<span style="color:#c53030; font-weight:bold;">🛑 FORA DA PLANTA</span><small>Distante das unidades</small>`;
                statusGps.style.backgroundColor = "#fff5f5";
            }
        }, null, { enableHighAccuracy: true });
    }

    function processarEnvio() {
        emitirBip();
        const modo = document.getElementById('modo-envio').value;
        const dataH = new Date().toLocaleDateString('pt-BR');
        let msg = "";
        let nomeFunc = "";

        if (modo === "individual") {
            nomeFunc = document.getElementById('select-individual').value;
            msg = `*FREQUÊNCIA INDIVIDUAL - TELEJUR*\n\n👤 *Funcionário:* ${nomeFunc}\n🏢 *Status:* ${dadosLoc.unidadeMsg}\n📅 *Data:* ${dataH}\n⏰ *Hora:* ${dadosLoc.hora}\n📍 *Mapa:* ${dadosLoc.link}`;
        } else {
            nomeFunc = "Equipe";
            let p = [], f = [];
            equipe.forEach((n, i) => {
                const cb = document.getElementById(`check-${i}`);
                if (cb.checked) p.push(`_${n}_`);
                else f.push(`_${n}_ (${document.getElementById(`motivo-${i}`).value})`);
            });
            msg = `*LISTA DE FREQUÊNCIA - TELEJUR*\n📅 *Data:* ${dataH}\n\n✅ *Presente na Planta:* ${p.length}\n${p.join('\n')}\n\n❌ *Ausentes:* ${f.length}\n${f.join('\n')}`;
        }

        document.getElementById('msg-agradecimento').innerText = `Obrigado, ${nomeFunc}`;
        document.getElementById('tela-sucesso').classList.remove('hidden');
        setTimeout(() => { document.getElementById('fill').style.width = "100%"; }, 50);

        setTimeout(() => {
            window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(msg));
            setTimeout(reiniciar, 1000); 
        }, 3000);
    }

    function alternarModo() {
        const modo = document.getElementById('modo-envio').value;
        document.getElementById('campos-geral').classList.toggle('hidden', modo === 'individual');
        document.getElementById('campos-individual').classList.toggle('hidden', modo === 'geral');
        document.getElementById('btn-principal').innerText = modo === 'individual' ? "🚀 Registrar frequencia" : "🚀 Enviar lista de frequencia";
        if (modo === 'individual') { document.getElementById('status-gps').classList.remove('hidden'); obterGps(); }
        else document.getElementById('status-gps').classList.add('hidden');
    }

    function chamadaAPI(params, cb) {
        const id = 'jsonp_' + Date.now();
        window[id] = (d) => { cb(d); delete window[id]; document.getElementById(id).remove(); };
        const s = document.createElement('script'); s.id = id;
        s.src = `${URL_GOOGLE}?${params}&callback=${id}`;
        document.body.appendChild(s);
    }

    function atualizarDados() {
        chamadaAPI("acao=ler", (data) => {
            equipe = Array.isArray(data) ? data : [];
            const listaDiv = document.getElementById('corpo-lista');
            const selInd = document.getElementById('select-individual');
            listaDiv.innerHTML = ""; selInd.innerHTML = "";
            equipe.forEach((nome, i) => {
                listaDiv.innerHTML += `
                    <div class="item-lista">
                        <span class="nome-func">${nome}</span>
                        <div style="display:flex; align-items:center; gap:8px;">
                            <input type="checkbox" id="check-${i}" checked onchange="monitorar()" style="width:20px; height:20px;">
                            <select id="motivo-${i}" class="hidden" style="width:145px; margin:0; padding:4px; font-size:12px;">
                                <option value="Falta não justificada">Falta não justificada</option>
                                <option value="Falta justificada">Falta justificada</option>
                                <option value="Atestado">Atestado</option>
                                <option value="Férias">Férias</option>
                            </select>
                        </div>
                    </div>`;
                selInd.innerHTML += `<option value="${nome}">${nome}</option>`;
            });
        });
    }

    function monitorar() {
        equipe.forEach((_, i) => {
            const cb = document.getElementById(`check-${i}`);
            document.getElementById(`motivo-${i}`).classList.toggle('hidden', cb.checked);
        });
    }

    function reiniciar() {
        document.getElementById('tela-sucesso').classList.add('hidden');
        document.getElementById('fill').style.width = "0%";
        document.getElementById('modo-envio').value = "geral";
        alternarModo();
        atualizarDados();
    }

    function abrirGestao() { if(prompt("Senha:")==="123") { /* Admin via Script */ } }
    window.onload = atualizarDados;
</script>
</body>
</html>
