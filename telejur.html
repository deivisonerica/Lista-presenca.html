<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequência Telejur - Juruti</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4 font-sans">

<div class="max-w-md mx-auto bg-white p-6 rounded-3xl shadow-xl min-h-[500px] flex flex-col relative overflow-hidden">
    
    <div id="tela-sucesso" class="hidden absolute inset-0 bg-white z-50 flex flex-col items-center justify-center text-center p-6">
        <h1 class="text-6xl mb-4">✅</h1>
        <h2 class="text-xl font-bold">Enviado!</h2>
    </div>

    <header class="text-center mb-6">
        <h1 class="text-xl font-black text-blue-800 uppercase">Frequência Telejur</h1>
        <p class="text-[10px] font-bold text-slate-400">UNIDADE JURUTI</p>
    </header>

    <div id="interface-usuario" class="space-y-4">
        <select id="modo-envio" onchange="alternarModo()" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none">
            <option value="geral">Lista Geral (Equipe)</option>
            <option value="individual">Individual</option>
        </select>

        <div id="campos-geral">
            <div id="corpo-lista" class="border rounded-2xl p-2 max-h-[300px] overflow-y-auto bg-slate-50">
                <p class="text-center p-10 text-slate-400 font-bold">Carregando equipe...</p>
            </div>
        </div>

        <div id="campos-individual" class="hidden space-y-4">
            <select id="select-individual" class="w-full p-4 border rounded-2xl font-bold bg-white"></select>
        </div>

        <button onclick="enviar()" class="w-full bg-green-500 text-white font-black py-5 rounded-2xl shadow-lg uppercase mt-4">🚀 Enviar Frequência</button>
    </div>
</div>

<script>
    // IMPORTANTE: Substitua pela sua nova URL após implantar o script acima
    const SCRIPT_URL = "SUA_NOVA_URL_AQUI"; 

    function chamada(params, cb) {
        const id = 'jsonp_' + Date.now();
        window[id] = (d) => { cb(d); delete window[id]; document.getElementById(id).remove(); };
        const s = document.createElement('script'); s.id = id;
        s.src = `${SCRIPT_URL}?${params}&callback=${id}`;
        document.body.appendChild(s);
    }

    function carregar() {
        chamada("acao=lerEquipe", (data) => {
            const lista = document.getElementById('corpo-lista');
            const sel = document.getElementById('select-individual');
            lista.innerHTML = ""; sel.innerHTML = "";
            
            data.forEach((n, i) => {
                lista.innerHTML += `
                    <div class="flex items-center justify-between p-3 bg-white border rounded-xl mb-1 shadow-sm">
                        <span class="font-bold text-xs text-slate-600">${n}</span>
                        <input type="checkbox" id="check-${i}" checked class="w-6 h-6 accent-green-500">
                    </div>`;
                sel.innerHTML += `<option>${n}</option>`;
            });
        });
    }

    function alternarModo() {
        const m = document.getElementById('modo-envio').value;
        document.getElementById('campos-geral').classList.toggle('hidden', m === 'individual');
        document.getElementById('campos-individual').classList.toggle('hidden', m === 'geral');
    }

    function enviar() {
        // Lógica de envio via WhatsApp (igual ao anterior)
        const dataH = new Date().toLocaleDateString('pt-BR');
        let texto = "*FREQUÊNCIA TELEJUR*\n📅 Data: " + dataH;
        // ... abre o WhatsApp
        alert("Enviando...");
        window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(texto));
    }

    window.onload = carregar;
</script>
</body>
</html>
