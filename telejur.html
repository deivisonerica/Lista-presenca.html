<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequência Telejur - Oficial</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 15px; display: flex; justify-content: center; margin: 0; }
        .container { width: 100%; max-width: 480px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); position: relative; }
        
        /* Título e Botão Admin */
        h2 { color: #0056b3; text-align: center; margin: 40px 0 20px 0; font-size: 20px; border: 2px solid #0056b3; padding: 12px; border-radius: 12px; background-color: #f8fbff; text-transform: uppercase; }
        .btn-admin-top { background: #0056b3; border: none; color: white; font-size: 10px; padding: 6px 12px; border-radius: 20px; cursor: pointer; position: absolute; top: 15px; right: 15px; font-weight: bold; text-transform: uppercase; }
        
        #loading { text-align: center; padding: 20px; color: #667; font-weight: bold; }
        
        /* Contadores Ajustados */
        .card-status { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 15px; }
        .status-box { background: #f8f9fa; padding: 6px 2px; border-radius: 8px; border: 1px solid #dee2e6; text-align: center; }
        .status-box span { display: block; font-size: 14px; font-weight: bold; color: #075E54; }
        .status-box label { font-size: 7px; text-transform: uppercase; color: #6c757d; font-weight: bold; line-height: 1; display: block; height: 14px; }
        
        /* Lista de Funcionários */
        .item-lista { display: flex; align-items: center; justify-content: space-between; padding: 10px 5px; border-bottom: 1px solid #f1f1f1; }
        .item-info { display: flex; align-items: center; gap: 8px; }
        .nome-func { font-size: 13px; color: #333; font-weight: 500; }
        
        select, input { width: 100%; font-size: 14px; border-radius: 8px; border: 1px solid #ccc; padding: 12px; background: #fff; margin-bottom: 10px; box-sizing: border-box; }
        .hidden { display: none !important; }

        /* GPS CENTRALIZADO (CORREÇÃO) */
        .btn-gps { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center;
            color: white; 
            padding: 15px; 
            border-radius: 10px; 
            font-weight: bold; 
            margin: 0 auto 15px auto; 
            width: 100%; 
            min-height: 70px; 
            background-color: #6c757d; 
            box-sizing: border-box;
            line-height: 1.4;
        }
        
        button.enviar { width: 100%; background-color: #25D366; color: white; border: none; padding: 18px; font-size: 16px; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 10px; box-shadow: 0 4px 12px rgba(37,211,102,0.3); }
        
        /* Painel Admin */
        #admin-area { border: 2px dashed #0056b3; padding: 15px; margin-top: 20px; border-radius: 10px; background: #f0f7ff; }
        .lista-admin { margin-top: 10px; max-height: 150px; overflow-y: auto; background: white; border: 1px solid #ddd; border-radius: 8px; }
        .item-admin { display: flex; justify-content: space-between; padding: 8px 10px; border-bottom: 1px solid #eee; font-size: 12px; align-items: center; }
        .btn-del { color: #d9534f; cursor: pointer; border: none; background: none; font-size: 16px; padding: 5px; }
    </style>
</head>
<body>

<div class="container">
    <button class="btn-admin-top" onclick="abrirPainelAdmin()">⚙️ Admin</button>
    <div id="loading">⌛ Sincronizando dados Telejur...</div>

    <div id="conteudo" class="hidden">
        <h2>Frequência Telejur</h2>

        <select id="modo-envio" onchange="alternarModo()">
            <option value="geral">Lista Geral (Equipe)</option>
            <option value="individual">Ponto Individual (Validar Local)</option>
        </select>

        <div id="status-gps" class="btn-gps hidden">Aguardando GPS...</div>

        <div id="campos-individual" class="hidden">
            <select id="select-individual"></select>
        </div>

        <div id="campos-geral">
            <div class="card-status">
                <div class="status-box"><span id="count-ferias">0</span><label>Férias</label></div>
                <div class="status-box"><span id="count-viagem">0</span><label>Viagem</label></div>
                <div class="status-box"><span id="count-atestado">0</span><label>Atest.</label></div>
                <div class="status-box"><span id="count-fj">0</span><label>F. Just.</label></div>
                <div class="status-box"><span id="count-fnj">0</span><label>F. Ñ Just.</label></div>
            </div>
            <div id="corpo-lista"></div>
        </div>

        <button class="enviar" onclick="enviarWhatsapp()">🚀 Enviar no WhatsApp</button>

        <div id="admin-area" class="hidden">
            <label style="font-size:11px; font-weight:bold; color:#0056b3;">GERENCIAR EQUIPE</label>
            <input type="text" id="novo-nome" placeholder="Nome Usuário">
            <input type="password" id="senha-admin" placeholder="Senha Admin">
            <button onclick="addFunc()" style="width:100%; background:#0056b3; color:white; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer; margin-bottom:10px;">➕ ADICIONAR</button>
            <div class="lista-admin" id="lista-admin-corpo"></div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxcDhXRYVo_Nn3VkFzHg9cq_rqUJZ1Ll9PcQzoIeOgt5VHxaQot1noJbyg5nKJSg6yW/exec";
    const pontosAlcoa = [
        { nome: "ALCOA - PORTO", lat: -2.1677, lon: -56.1017 },
        { nome: "ALCOA - BENEFICIAMENTO", lat: -2.4488, lon: -56.1708 }
    ];

    let equipe = [];
    let dadosLoc = { link: "", unidade: "FORA DA PLANTA", hora: "" };

    function calcularDistancia(lat1, lon1, lat2, lon2) {
        const R = 6371000; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    async function carregarEquipe() {
        try {
            const response = await fetch(API_URL + "?acao=ler");
            equipe = await response.json();
            renderizarLista();
            renderizarAdmin();
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('conteudo').classList.remove('hidden');
        } catch (error) {
            document.getElementById('loading').innerText = "❌ Erro na sincronização.";
        }
    }

    function renderizarLista() {
        const listaDiv = document.getElementById('corpo-lista');
        const selInd = document.getElementById('select-individual');
        listaDiv.innerHTML = ""; selInd.innerHTML = "";
        equipe.forEach((nome, i) => {
            listaDiv.innerHTML += `
                <div class="item-lista">
                    <div class="item-info">
                        <input type="checkbox" id="check-${i}" checked onchange="monitorar()">
                        <span class="nome-func">${nome}</span>
                    </div>
                    <select id="motivo-${i}" class="hidden" style="width:auto; padding:2px; font-size:10px; margin:0;" onchange="monitorar()">
                        <option value="Férias">Férias</option>
                        <option value="Em viagem">Em viagem</option>
                        <option value="Atestado">Atestado</option>
                        <option value="Falta Justificada">F. Justificada</option>
                        <option value="Falta Não Justificada">F. Ñ Justificada</option>
                    </select>
                </div>`;
            selInd.innerHTML += `<option value="${nome}">${nome}</option>`;
        });
        monitorar();
    }

    function renderizarAdmin() {
        const div = document.getElementById('lista-admin-corpo');
        div.innerHTML = "";
        equipe.forEach(nome => {
            div.innerHTML += `<div class="item-admin"><span>${nome}</span><button class="btn-del" onclick="delFunc('${nome}')">🗑️</button></div>`;
        });
    }

    async function addFunc() {
        const nome = document.getElementById('novo-nome').value.trim();
        const senha = document.getElementById('senha-admin').value;
        if(!nome || !senha) return alert("Preencha Nome e Senha!");
        const res = await fetch(`${API_URL}?acao=add&nome=${encodeURIComponent(nome)}&senha=${senha}`);
        const txt = await res.text();
        if(txt === "OK") location.reload(); else alert("Erro: " + txt);
    }

    async function delFunc(nome) {
        const senha = document.getElementById('senha-admin').value;
        if(!senha) return alert("Digite a senha no campo Admin acima para excluir!");
        if(!confirm(`Excluir ${nome}?`)) return;
        const res = await fetch(`${API_URL}?acao=deletar&nome=${encodeURIComponent(nome)}&senha=${senha}`);
        const txt = await res.text();
        if(txt === "OK") location.reload(); else alert("Erro: " + txt);
    }

    function obterGps() {
        const btn = document.getElementById('status-gps');
        btn.innerHTML = "⌛ Localizando...";
        navigator.geolocation.getCurrentPosition(pos => {
            const lat = pos.coords.latitude; 
            const lon = pos.coords.longitude;
            dadosLoc.hora = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
            dadosLoc.link = `https://www.google.com/maps?q=${lat},${lon}`;
            
            let planta = null;
            pontosAlcoa.forEach(p => { if (calcularDistancia(lat, lon, p.lat, p.lon) <= 800) planta = p.nome; });

            if (planta) {
                dadosLoc.unidade = planta;
                btn.innerHTML = `✅ ${planta}<br>${dadosLoc.hora}`;
                btn.style.backgroundColor = "#075E54";
            } else {
                dadosLoc.unidade = "FORA DA PLANTA";
                btn.innerHTML = `🛑 FORA DA PLANTA<br>${dadosLoc.hora}`;
                btn.style.backgroundColor = "#d9534f";
            }
        }, err => { btn.innerHTML = "❌ GPS Desativado"; }, {enableHighAccuracy: true});
    }

    function alternarModo() {
        const m = document.getElementById('modo-envio').value;
        document.getElementById('campos-geral').classList.toggle('hidden', m === 'individual');
        document.getElementById('campos-individual').classList.toggle('hidden', m === 'geral');
        
        const gpsBox = document.getElementById('status-gps');
        if (m === 'individual') {
            gpsBox.classList.remove('hidden');
            obterGps();
        } else {
            gpsBox.classList.add('hidden');
        }
    }

    function monitorar() {
        let f=0, v=0, a=0, fj=0, fnj=0;
        equipe.forEach((_, i) => {
            const cb = document.getElementById(`check-${i}`);
            const sel = document.getElementById(`motivo-${i}`);
            if(!cb.checked) {
                sel.classList.remove('hidden');
                const val = sel.value;
                if(val === "Férias") f++;
                else if(val === "Em viagem") v++;
                else if(val === "Atestado") a++;
                else if(val === "Falta Justificada") fj++;
                else if(val === "Falta Não Justificada") fnj++;
            } else sel.classList.add('hidden');
        });
        document.getElementById('count-ferias').innerText = f;
        document.getElementById('count-viagem').innerText = v;
        document.getElementById('count-atestado').innerText = a;
        document.getElementById('count-fj').innerText = fj;
        document.getElementById('count-fnj').innerText = fnj;
    }

    function abrirPainelAdmin() {
        const s = prompt("Senha Admin:");
        if(s === "123") document.getElementById('admin-area').classList.toggle('hidden');
    }

    function enviarWhatsapp() {
        const m = document.getElementById('modo-envio').value;
        const data = new Date().toLocaleDateString('pt-BR');
        let msg = "";
        if (m === "individual") {
            msg = `*FREQUÊNCIA INDIVIDUAL*\n✅ *Telejur*\n📅 Data: ${data}\n⏰ Hora: ${dadosLoc.hora}\n👤 Nome: _${document.getElementById('select-individual').value}_\n🏢 Unidade: ${dadosLoc.unidade}\n📍 Mapa: ${dadosLoc.link}`;
        } else {
            let p=[], aus=[];
            equipe.forEach((nome, i) => {
                if(document.getElementById(`check-${i}`).checked) p.push(`- _${nome}_`);
                else aus.push(`- _${nome}_ (*${document.getElementById(`motivo-${i}`).value}*)`);
            });
            msg = `*FREQUÊNCIA TELEJUR*\n📅 Data: ${data}\n\n✅ *NA PLANTA (${p.length}):*\n${p.join('\n')}\n\n❌ *AUSÊNCIAS:* \n${aus.join('\n') || "_Nenhuma_"}`;
        }
        window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(msg));
    }
    window.onload = carregarEquipe;
</script>
</body>
</html>
