<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequência Telejur - Oficial</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        h2 { color: #075E54; text-align: center; margin-bottom: 20px; font-size: 22px; }
        .item-lista { display: flex; align-items: center; justify-content: space-between; padding: 10px 5px; border-bottom: 1px solid #f1f1f1; }
        .nome-func { font-size: 14px; color: #333; font-weight: bold; }
        .hidden { display: none; }
        button.enviar { width: 100%; background-color: #25D366; color: white; border: none; padding: 16px; font-size: 16px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 Frequência Telejur</h2>
    <div id="corpo-lista" style="text-align: center; color: gray; padding: 20px;">
        ⌛ Carregando equipe...
    </div>
    <button class="enviar" onclick="enviarWhatsapp()">🚀 Enviar no WhatsApp</button>
</div>

<script>
    // COLE AQUI A URL QUE VOCÊ COPIOU DO GOOGLE SCRIPT
    const SCRIPT_URL = "SUA_URL_AQUI"; 

    let equipe = [];

    function buscarEquipe() {
        const id = 'jsonp_' + Date.now();
        window[id] = (data) => {
            equipe = data;
            const listaDiv = document.getElementById('corpo-lista');
            listaDiv.innerHTML = "";
            data.forEach((nome, i) => {
                listaDiv.innerHTML += `
                    <div class="item-lista">
                        <span class="nome-func">${nome}</span>
                        <input type="checkbox" id="check-${i}" checked style="transform: scale(1.3);">
                    </div>`;
            });
            delete window[id];
            document.getElementById(id).remove();
        };
        const s = document.createElement('script');
        s.id = id;
        s.src = `${SCRIPT_URL}?callback=${id}`;
        document.body.appendChild(s);
    }

    function enviarWhatsapp() {
        const data = new Date().toLocaleDateString('pt-BR');
        let presentes = [];
        let faltas = [];

        equipe.forEach((nome, i) => {
            if (document.getElementById(`check-${i}`).checked) presentes.push(`✅ _${nome}_`);
            else faltas.push(`❌ _${nome}_`);
        });

        const msg = `*FREQUÊNCIA TELEJUR*\n📅 Data: ${data}\n\n*PRESENTES:*\n${presentes.join('\n')}\n\n*FALTAS:*\n${faltas.join('\n')}`;
        window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(msg));
    }

    window.onload = buscarEquipe;
</script>
</body>
</html>
