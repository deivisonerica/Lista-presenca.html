<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequência Telejur - Oficial</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); position: relative; box-sizing: border-box; }
        
        /* TÍTULO COM ÍCONE */
        .header-title { display: flex; align-items: center; justify-content: center; gap: 10px; color: #075E54; margin-bottom: 20px; font-size: 22px; font-weight: bold; }

        /* BOTÃO ADMIN/GESTÃO */
        .btn-admin-top { position: absolute; top: 15px; right: 15px; background: #007bff; color: white; border: none; padding: 6px 12px; border-radius: 50px; font-size: 10px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 4px; }

        /* CARTÃO DE STATUS (CONTADORES) */
        .card-status { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 20px; }
        .status-box { background: #f8f9fa; padding: 8px; border-radius: 10px; border: 1px solid #dee2e6; text-align: center; }
        .status-box span { display: block; font-size: 16px; font-weight: bold; color: #075E54; }
        .status-box label { font-size: 9px; text-transform: uppercase; color: #6c757d; font-weight: bold; }

        /* LISTA DE FUNCIONÁRIOS - CORRIGIDO */
        .item-lista { display: flex; align-items: center; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid #f1f1f1; gap: 10px; width: 100%; }
        .item-info { display: flex; align-items: center; gap: 15px; flex: 1; } /* Aumentado o gap para o checkbox */
        .item-info input { transform: scale(1.4); cursor: pointer; flex-shrink: 0; margin-left: 5px; }
        .nome-func { font-size: 15px; color: #333; font-weight: 500; }
        
        select { width: 100%; font-size: 14px; border-radius: 8px; border: 1px solid #ccc; padding: 12px; background: #fff; margin-bottom: 15px; box-sizing: border-box; }
        .hidden { display: none !important; }

        /* CAMPO DE LOCALIZAÇÃO - CORREÇÃO DE ALINHAMENTO */
        .btn-gps { 
            background-color: #d9534f; 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 10px; 
            font-weight: bold; 
            margin: 10px 0 20px 0; 
            width: 100%; /* Ocupa toda a largura do container */
            font-size: 15px; 
            text-align: center; 
            box-sizing: border-box; /* Crucial para não estourar a borda */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }
        .btn-gps small { font-weight: normal; opacity: 0.9; font-size: 12px; }
        
        button.enviar { width: 100%; background-color: #25D366; color: white; border: none; padding: 16px; font-size: 16px; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .label-peq { font-size: 12px; font-weight: bold; color: #075E54; display: block; margin-bottom: 8px; text-transform: uppercase; }

        /* SEÇÃO GESTÃO */
        #secao-gestao { border: 2px dashed #007bff; padding: 15px; border-radius: 10px; background: #f9f9f9; margin-top: 10px; }
        .admin-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #ddd; background: white; margin-bottom: 5px; border-radius: 5px; }
        .btn-excluir { color: #d9534f; border: none; background: none; cursor: pointer; font-size: 18px; padding: 0 10px; }
    </style>
</head>
<body>

<div class="container">
    <button class="btn-admin-top" onclick="loginGestao()">⚙️ GESTÃO</button>

    <div id="interface-usuario">
        <div class="header-title">📋 Frequência Telejur</div>

        <label class="label-peq">Modo de Envio:</label>
        <select id="modo-envio" onchange="alternarModo()">
            <option value="geral">Lista Geral (Equipe)</option>
            <option value="individual">Formulário Individual (Validar Local)</option>
        </select>

        <div id="status-gps" class="btn-gps hidden">
            <span>⌛ Localizando...</span>
        </div>

        <div id="campos-individual" class="hidden">
            <label class="label-peq">Funcionário:</label>
            <select id="select-individual"></select>
        </div>

        <div id="campos-geral">
            <div class="card-status">
                <div class="status-box"><span id="count-ferias">0</span><label>Férias</label></div>
                <div class="status-box"><span id="count-atestado">0</span><label>Atestado</label></div>
                <div class="status-box"><span id="count-faltajust">0</span><label>F. Justif.</label></div>
                <div class="status-box"><span id="count-faltas">0</span><label>Faltas</label></div>
            </div>
            <div id="corpo-lista"></div>
        </div>

        <button class="enviar" onclick="enviarWhatsapp()">🚀 Enviar no WhatsApp</button>
    </div>

    <div id="secao-gestao" class="hidden">
        <h3 style="color: #007bff; text-align: center;">Painel de Gestão</h3>
        <label class="label-peq">Novo Colaborador:</label>
        <input type="text" id="novo-colaborador" style="width:100%; padding:12px; border-radius:8px; border:1px solid #ccc; margin-bottom:10px; box-sizing:border-box;" placeholder="Nome completo...">
        <button onclick="cadastrarColaborador()" style="width:100%; background:#007bff; color:white; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer;">CADASTRAR</button>
        
        <label class="label-peq" style="margin-top: 20px;">Lista para Exclusão:</label>
        <div id="lista-gestao-nomes" style="max-height: 250px; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; padding: 5px;"></div>
        
        <button onclick="sairGestao()" style="width:100%; background:#6c757d; color:white; border:none; padding:12px; border-radius:8px; margin-top:15px; font-weight:bold; cursor:pointer;">🚪 SAIR</button>
    </div>
</div>

<script>
    // Se a planilha estiver conectada, esses nomes devem ser carregados dinamicamente
    let equipe = ["Adriano Nascimento", "Cezar Prado", "Deivison Aleidson", "Edenildo Rodrigues", "Francivaldo Costa", "Joelcinei Guimarães", "Jean Soares", "Lucas Santos", "Matheus Costa", "Welyton Pereira", "Ruan Barros", "Rafael Gonçalves"];

    function carregarLista() {
        const listaDiv = document.getElementById('corpo-lista');
        const selInd = document.getElementById('select-individual');
        const listaGestao = document.getElementById('lista-gestao-nomes');
        listaDiv.innerHTML = ""; selInd.innerHTML = ""; listaGestao.innerHTML = "";
        
        equipe.sort().forEach((nome, i) => {
            listaDiv.innerHTML += `
                <div class="item-lista">
                    <div class="item-info">
                        <input type="checkbox" id="check-${i}" checked onchange="monitorar()">
                        <span class="nome-func">${nome}</span>
                    </div>
                    <select id="motivo-${i}" class="hidden" style="width: auto; margin-bottom:0; padding:5px;" onchange="monitorar()">
                        <option value="Falta sem justificativa">Falta</option>
                        <option value="Atestado">Atestado</option>
                        <option value="Férias">Férias</option>
                        <option value="Em viagem">Viagem</option>
                        <option value="Falta justificada">Justificada</option>
                    </select>
                </div>`;
            selInd.innerHTML += `<option value="${nome}">${nome}</option>`;
            listaGestao.innerHTML += `
                <div class="admin-item">
                    <span>${nome}</span>
                    <button class="btn-excluir" onclick="excluirColaborador('${nome}', ${i})">🗑️</button>
                </div>`;
        });
        monitorar();
    }

    function cadastrarColaborador() {
        const input = document.getElementById('novo-colaborador');
        const nome = input.value.trim();
        if(nome) {
            equipe.push(nome);
            input.value = "";
            carregarLista();
            // Integração com Planilha (Se rodando via Google Web App)
            if (typeof google !== 'undefined') {
                google.script.run.cadastrarNoSheet(nome);
            }
            alert("Cadastrado com sucesso!");
        }
    }

    function excluirColaborador(nome, index) {
        if(confirm("Deseja excluir " + nome + "?")) {
            equipe.splice(index, 1);
            carregarLista();
            if (typeof google !== 'undefined') {
                google.script.run.excluirNoSheet(nome);
            }
        }
    }

    // --- FUNÇÕES DE INTERFACE E GPS ---
    function loginGestao() {
        if(prompt("Senha:") === "123") {
            document.getElementById('interface-usuario').classList.add('hidden');
            document.getElementById('secao-gestao').classList.remove('hidden');
        }
    }

    function sairGestao() {
        document.getElementById('interface-usuario').classList.remove('hidden');
        document.getElementById('secao-gestao').classList.add('hidden');
    }

    function alternarModo() {
        const modo = document.getElementById('modo-envio').value;
        document.getElementById('campos-geral').classList.toggle('hidden', modo === 'individual');
        document.getElementById('campos-individual').classList.toggle('hidden', modo === 'geral');
        if (modo === 'individual') {
            document.getElementById('status-gps').classList.remove('hidden');
            obterGps();
        } else {
            document.getElementById('status-gps').classList.add('hidden');
        }
    }

    function obterGps() {
        const statusGps = document.getElementById('status-gps');
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition((pos) => {
            const hora = new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
            statusGps.innerHTML = `<span>🛑 FORA DA PLANTA - ${hora}</span><small>Via identificada</small>`;
            statusGps.style.backgroundColor = "#d9534f";
        });
    }

    function monitorar() {
        let f=0, a=0, j=0, s=0;
        equipe.forEach((_, i) => {
            const cb = document.getElementById(`check-${i}`);
            const sel = document.getElementById(`motivo-${i}`);
            if (cb && !cb.checked) {
                sel.classList.remove('hidden');
                const val = sel.value;
                if (val === "Férias") f++; else if (val === "Atestado") a++; else if (val === "Falta justificada") j++; else s++;
            } else if (sel) { sel.classList.add('hidden'); }
        });
        document.getElementById('count-ferias').innerText = f;
        document.getElementById('count-atestado').innerText = a;
        document.getElementById('count-faltajust').innerText = j;
        document.getElementById('count-faltas').innerText = s;
    }

    window.onload = carregarLista;
</script>
</body>
</html>
