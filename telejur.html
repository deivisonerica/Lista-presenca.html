<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequência Telejur - Oficial</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        h2 { color: #075E54; text-align: center; margin-bottom: 20px; font-size: 22px; }
        
        .card-status { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
        .status-box { background: #f8f9fa; padding: 8px; border-radius: 10px; border: 1px solid #dee2e6; text-align: center; }
        .status-box span { display: block; font-size: 16px; font-weight: bold; color: #075E54; }
        .status-box label { font-size: 9px; text-transform: uppercase; color: #6c757d; font-weight: bold; }

        .item-lista { display: flex; align-items: center; justify-content: space-between; padding: 10px 5px; border-bottom: 1px solid #f1f1f1; }
        .item-info { display: flex; align-items: center; gap: 10px; }
        .item-info input { transform: scale(1.3); cursor: pointer; }
        .nome-func { font-size: 14px; color: #333; }
        
        select { width: 100%; font-size: 14px; border-radius: 8px; border: 1px solid #ccc; padding: 10px; background: #fff; margin-bottom: 10px; }
        .hidden { display: none; }

        .btn-gps { background-color: #6c757d; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; margin-bottom: 15px; width: 100%; font-size: 13px; text-align: center; transition: 0.3s; }
        button.enviar { width: 100%; background-color: #25D366; color: white; border: none; padding: 16px; font-size: 16px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 20px; transition: 0.3s; box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3); }
        button.enviar:hover { background-color: #128C7E; }
        .label-peq { font-size: 12px; font-weight: bold; color: #075E54; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 Frequência Telejur</h2>

    <label class="label-peq">MODO DE ENVIO:</label>
    <select id="modo-envio" onchange="alternarModo()">
        <option value="geral">Lista Geral (Equipe)</option>
        <option value="individual">Formulário Individual (Validar Unidade)</option>
    </select>

    <div id="status-gps" class="btn-gps hidden">⌛ Identificando unidade Alcoa...</div>

    <div id="campos-individual" class="hidden">
        <label class="label-peq">FUNCIONÁRIO:</label>
        <select id="select-individual"></select>
    </div>

    <div id="campos-geral">
        <div class="card-status">
            <div class="status-box"><span id="count-ferias">0</span><label>Férias</label></div>
            <div class="status-box"><span id="count-atestado">0</span><label>Atestado</label></div>
            <div class="status-box"><span id="count-viagem">0</span><label>Viagem</label></div>
            <div class="status-box"><span id="count-faltajust">0</span><label>F. Justif.</label></div>
            <div class="status-box"><span id="count-faltas">0</span><label>Faltas</label></div>
        </div>
        <div id="corpo-lista"></div>
    </div>

    <button id="btn-enviar" class="enviar" onclick="enviarWhatsapp()">🚀 Enviar para Mirielly</button>
</div>

<script>
    const equipe = [
        "Adriano Nascimento", "Cezar Prado", "Deivison Aleidson", 
        "Edenildo Rodrigues", "Francivaldo Costa", "Joelcinei Guimarães", 
        "Jean Soares", "Lucas Santos", "Matheus Costa", 
        "Welyton Pereira", "Ruan Barros", "Rafael Gonçalves"
    ];

    // Coordenadas aproximadas das unidades em Juruti
    const unidadesAlcoa = [
        { nome: "ALCOA - PORTO", lat: -2.155555, lon: -56.095555 },
        { nome: "ALCOA - BENEFICIAMENTO", lat: -2.448888, lon: -56.170888 }
    ];
    
    let dadosLocalizacao = { link: "", endereco: "Detectando...", statusFrequencia: "Ausente", unidadeEspecifica: "Fora da Planta" };

    function carregarLista() {
        const listaDiv = document.getElementById('corpo-lista');
        const selectIndividual = document.getElementById('select-individual');
        listaDiv.innerHTML = "";
        selectIndividual.innerHTML = "";
        equipe.forEach((nome, i) => {
            listaDiv.innerHTML += `
                <div class="item-lista">
                    <div class="item-info">
                        <input type="checkbox" id="check-${i}" checked onchange="monitorar()">
                        <span class="nome-func" id="label-${i}">${nome}</span>
                    </div>
                    <select id="motivo-${i}" class="hidden" style="width: auto; margin-bottom: 0;" onchange="monitorar()">
                        <option value="Falta sem justificativa">❌ Falta</option>
                        <option value="atestado">🏥 Atestado</option>
                        <option value="Férias">🌴 Férias</option>
                        <option value="Em Viagem">✈️ Viagem</option>
                        <option value="Falta Justificada">✅ Justificada</option>
                    </select>
                </div>`;
            selectIndividual.innerHTML += `<option value="${nome}">${nome}</option>`;
        });
    }

    function alternarModo() {
        const modo = document.getElementById('modo-envio').value;
        const gpsDiv = document.getElementById('status-gps');
        document.getElementById('campos-geral').classList.toggle('hidden', modo === 'individual');
        document.getElementById('campos-individual').classList.toggle('hidden', modo === 'geral');

        if (modo === 'individual') {
            gpsDiv.classList.remove('hidden');
            obterLocalizacaoAuto();
        } else {
            gpsDiv.classList.add('hidden');
        }
    }

    function checarUnidade(lat, lon) {
        for (const unidade of unidadesAlcoa) {
            // Raio de aproximadamente 1km para cada unidade
            const dist = Math.sqrt(Math.pow(lat - unidade.lat, 2) + Math.pow(lon - unidade.lon, 2));
            if (dist < 0.009) return unidade.nome; 
        }
        return null;
    }

    async function obterLocalizacaoAuto() {
        const statusGps = document.getElementById('status-gps');
        if (!navigator.geolocation) return;

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            dadosLocalizacao.link = `https://www.google.com/maps?q=${lat},${lon}`;

            const unidadeAlcoa = checarUnidade(lat, lon);
            
            if (unidadeAlcoa) {
                dadosLocalizacao.unidadeEspecifica = unidadeAlcoa;
                dadosLocalizacao.endereco = unidadeAlcoa;
                dadosLocalizacao.statusFrequencia = "Presente na Unidade";
                statusGps.innerText = "✅ " + unidadeAlcoa;
                statusGps.style.backgroundColor = "#075E54";
            } else {
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                    const data = await res.json();
                    const rua = data.address.road || "Rua não identificada";
                    const cidade = data.address.city || data.address.town || "Juruti";
                    
                    dadosLocalizacao.unidadeEspecifica = "Fora da Planta";
                    dadosLocalizacao.endereco = `${rua} - ${cidade}`;
                    dadosLocalizacao.statusFrequencia = "Ausente (Local Externo)";
                    statusGps.innerText = "🛑 FORA DA PLANTA (" + cidade + ")";
                    statusGps.style.backgroundColor = "#d9534f";
                } catch (e) {
                    dadosLocalizacao.unidadeEspecifica = "Fora da Planta";
                    dadosLocalizacao.statusFrequencia = "Ausente";
                    statusGps.innerText = "🛑 FORA DA PLANTA";
                    statusGps.style.backgroundColor = "#d9534f";
                }
            }
        }, () => {
            statusGps.innerText = "⚠️ GPS não obtido.";
            statusGps.style.backgroundColor = "#856404";
        });
    }

    function monitorar() {
        let f = 0, a = 0, v = 0, j = 0, faltas = 0;
        equipe.forEach((_, i) => {
            const cb = document.getElementById(`check-${i}`);
            const sel = document.getElementById(`motivo-${i}`);
            if (!cb.checked) {
                const val = sel.value;
                if (val === "Férias") f++;
                else if (val === "atestado") a++;
                else if (val === "Em Viagem") v++;
                else if (val === "Falta Justificada") j++;
                else faltas++;
                sel.classList.remove('hidden');
            } else {
                sel.classList.add('hidden');
            }
        });
        document.getElementById('count-ferias').innerText = f;
        document.getElementById('count-atestado').innerText = a;
        document.getElementById('count-viagem').innerText = v;
        document.getElementById('count-faltajust').innerText = j;
        document.getElementById('count-faltas').innerText = faltas;
    }

    function enviarWhatsapp() {
        const modo = document.getElementById('modo-envio').value;
        const dataHoje = new Date().toLocaleDateString('pt-BR');
        
        let locInfo = modo === "individual" 
            ? `🏢 *Unidade:* ${dadosLocalizacao.unidadeEspecifica}\n📍 *Localização:* ${dadosLocalizacao.endereco}\n📊 *Status:* ${dadosLocalizacao.statusFrequencia}\n🔗 *Link GPS:* ${dadosLocalizacao.link}\n`
            : "";

        let msg = "";

        if (modo === "individual") {
            const nome = document.getElementById('select-individual').value;
            msg = `*RELATÓRIO DE FREQUÊNCIA INDIVIDUAL*\n\n` +
                  `💼 *Empresa: Telejur*\n` +
                  `📅 Data: ${dataHoje}\n` +
                  `👤 Funcionário: _${nome}_\n\n` +
                  locInfo;
        } else {
            let pres = [];
            equipe.forEach((nome, i) => {
                if (document.getElementById(`check-${i}`).checked) pres.push(`_${nome}_`);
            });

            msg = `*LISTA DE FREQUÊNCIA TELEJUR*\n\n` +
                  `📅 Data: ${dataHoje}\n\n` +
                  `✔️ *Efetivo na planta:* ${pres.length}\n${pres.join('\n')}\n\n` +
                  `Relatório Geral enviado com sucesso.`;
        }

        window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(msg));
    }

    window.onload = carregarLista;
</script>
</body>
</html>
