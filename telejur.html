<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequência Telejur - Oficial</title>
    <style>
        :root {
            --primary-blue: #0056b3;
            --bg-light: #f4f7f9;
            --text-main: #33475b;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-light); padding: 15px; display: flex; justify-content: center; margin: 0; }
        .container { width: 100%; max-width: 480px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; }
        
        h2 { color: var(--primary-blue); text-align: center; margin: 40px 0 20px 0; font-size: 20px; border: 2px solid var(--primary-blue); padding: 12px; border-radius: 12px; text-transform: uppercase; }

        /* AJUSTE DE ALINHAMENTO À ESQUERDA */
        .item-lista { 
            display: flex; 
            align-items: center; 
            justify-content: flex-start; /* Força tudo para a esquerda */
            padding: 12px 5px; 
            border-bottom: 1px solid #f0f3f5; 
            gap: 15px; /* Espaço fixo entre checkbox e nome */
        }
        .item-info { 
            display: flex; 
            align-items: center; 
            flex: 1; /* Ocupa o espaço restante */
            gap: 12px;
        }
        .nome-func { 
            font-size: 14px; 
            color: var(--text-main); 
            font-weight: 500; 
            text-align: left; /* Garante alinhamento do texto */
        }

        /* TELA DE AGRADECIMENTO */
        #tela-final { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--primary-blue); color: white; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 1000; text-align: center; padding: 20px; 
        }

        .hidden { display: none !important; }
        button.enviar { width: 100%; background: #25D366; color: white; border: none; padding: 18px; font-size: 16px; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

<div id="tela-final" class="hidden">
    <h1 style="font-size: 40px;">✅</h1>
    <h1 id="msg-agradecimento"></h1>
    <p>Seu registro foi enviado com sucesso.</p>
    <button onclick="window.location.reload()" style="background: white; color: var(--primary-blue); border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; margin-top: 20px;">VOLTAR</button>
</div>

<div class="container">
    <div id="conteudo">
        <h2>Frequência Telejur</h2>
        
        <select id="modo-envio" style="width:100%; padding:12px; margin-bottom:20px; border-radius:10px; border:1px solid #ccc;">
            <option value="geral">Lista Geral (Equipe)</option>
            <option value="individual">Ponto Individual</option>
        </select>

        <div id="corpo-lista">
            <div class="item-lista">
                <input type="checkbox" checked style="transform: scale(1.4);">
                <span class="nome-func">Adriano Nascimento</span>
            </div>
            </div>

        <button class="enviar" onclick="finalizarEnvio()">🚀 ENVIAR RELATÓRIO</button>
    </div>
</div>

<script>
    // Função do Bip Sonoro (Padrão Alcoa/Telejur)
    function tocarBip() {
        const context = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = context.createOscillator();
        const gain = context.createGain();
        oscillator.connect(gain);
        gain.connect(context.destination);
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(800, context.currentTime);
        gain.gain.setValueAtTime(0.1, context.currentTime);
        oscillator.start();
        oscillator.stop(context.currentTime + 0.2);
    }

    function finalizarEnvio() {
        tocarBip();
        
        const modo = document.getElementById('modo-envio').value;
        let nomeExibicao = "Equipe";
        
        if(modo === "individual") {
            // Se tiver um select de nomes, pegamos o valor dele
            const sel = document.getElementById('select-individual');
            nomeExibicao = sel ? sel.value : "Colaborador";
        }

        document.getElementById('msg-agradecimento').innerText = `Obrigado, ${nomeExibicao}!`;
        document.getElementById('tela-final').classList.remove('hidden');
        
        // Aqui você manteria sua lógica de window.open para o WhatsApp
    }
</script>
</body>
</html>
