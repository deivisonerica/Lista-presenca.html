<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frequência Telejur - Oficial</title>
    <style>
        :root { --whatsapp: #25D366; --dark-green: #075E54; --red: #d9534f; --gray: #6c757d; --bg: #f0f2f5; }
        
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); padding: 15px; display: flex; justify-content: center; margin: 0; }
        .container { width: 100%; max-width: 450px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); box-sizing: border-box; }
        
        h2 { color: var(--dark-green); text-align: center; margin-bottom: 20px; font-size: 22px; text-transform: uppercase; border-bottom: 2px solid var(--whatsapp); padding-bottom: 10px; }
        
        /* Dashboard de Contagem */
        .card-status { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 20px; }
        .status-box { background: #f8f9fa; padding: 8px 2px; border-radius: 10px; border: 1px solid #dee2e6; text-align: center; }
        .status-box span { display: block; font-size: 16px; font-weight: bold; color: var(--dark-green); }
        .status-box label { font-size: 9px; text-transform: uppercase; color: #6c757d; font-weight: bold; }

        /* Lista de Funcionários */
        .item-lista { display: flex; align-items: center; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid #f1f1f1; }
        .item-info { display: flex; align-items: center; gap: 12px; flex: 1; }
        .item-info input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; accent-color: var(--whatsapp); }
        .nome-func { font-size: 14px; color: #333; font-weight: 500; }
        
        select { font-size: 14px; border-radius: 8px; border: 1px solid #ccc; padding: 10px; background: #fff; margin-bottom: 10px; width: 100%; }
        .sel-motivo { width: auto !important; height: 35px; font-size: 11px !important; padding: 2px !important; border-color: var(--red); color: var(--red); }

        .hidden { display: none; }

        /* Botão de GPS */
        .btn-gps { background-color: var(--gray); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; margin-bottom: 15px; width: 100%; font-size: 13px; text-align: center; line-height: 1.4; transition: 0.3s; }
        
        /* Botão Enviar */
        button.enviar { width: 100%; background-color: var(--whatsapp); color: white; border: none; padding: 18px; font-size: 16px; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 20px; transition: 0.3s; box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3); text-transform: uppercase; }
        button.enviar:active { transform: scale(0.98); }

        .label-peq { font-size: 11px; font-weight: bold; color: var(--dark-green); display: block; margin-bottom: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 Frequência Telejur</h2>

    <label class="label-peq">Modo de Operação:</label>
    <select id="modo-envio" onchange="alternarModo()">
        <option value="geral">Lista Geral (Equipe Completa)</option>
        <option value="individual">Ponto Individual (Validar GPS)</option>
    </select>

    <div id="status-gps" class="btn-gps hidden">⌛ Aguardando permissão de localização...</div>

    <div id="campos-individual" class="hidden">
        <label class="label-peq">Selecione seu Nome:</label>
        <select id="select-individual"></select>
    </div>

    <div id="campos-geral">
        <div class="card-status">
            <div class="status-box"><span id="count-ferias">0</span><label>Férias</label></div>
            <div class="status-box"><span id="count-atestado">0</span><label>Atest.</label></div>
            <div class="status-box"><span id="count-faltajust">0</span><label>F. Just.</label></div>
            <div class="status-box"><span id="count-faltas">0</span><label>Faltas</label></div>
        </div>
        <div id="corpo-lista"></div>
    </div>

    <button class="enviar" onclick="enviarWhatsapp()">🚀 Gerar Mensagem WhatsApp</button>
</div>

<script>
    const equipe = [
        "Adriano Nascimento", "Cezar Prado", "Deivison Aleidson", 
        "Edenildo Rodrigues", "Francivaldo Costa", "Joelcinei Guimarães", 
        "Jean Soares", "Lucas Santos", "Matheus Costa", 
        "Welyton Pereira", "Ruan Barros", "Rafael Gonçalves"
    ];

    const pontosAlcoa = [
        { nome: "ALCOA - PORTO", lat: -2.1677, lon: -56.1017 },
        { nome: "ALCOA - BENEFICIAMENTO", lat: -2.4488, lon: -56.1708 }
    ];

    let dadosLoc = { link: "", endereco: "", unidade: "NÃO IDENTIFICADO", status: "Ausente", hora: "" };

    function carregarLista() {
        const listaDiv = document.getElementById('corpo-lista');
        const selInd = document.getElementById('select-individual');
        listaDiv.innerHTML = ""; selInd.innerHTML = "";
        
        equipe.sort().forEach((nome, i) => {
            listaDiv.innerHTML += `
                <div class="item-lista">
                    <div class="item-info">
                        <input type="checkbox" id="check-${i}" checked onchange="monitorar()">
                        <span class="nome-func">${nome}</span>
                    </div>
                    <select id="motivo-${i}" class="hidden sel-motivo" onchange="monitorar()">
                        <option value="Falta sem justificativa">FALTA S/ JUST.</option>
                        <option value="Atestado">ATESTADO</option>
                        <option value="Férias">FÉRIAS</option>
                        <option value="Em viagem">EM VIAGEM</option>
                        <option value="Falta justificada">FALTA JUSTIF.</option>
                    </select>
                </div>`;
            selInd.innerHTML += `<option value="${nome}">${nome}</option>`;
        });
    }

    function alternarModo() {
        const modo = document.getElementById('modo-envio').value;
        document.getElementById('campos-geral').classList.toggle('hidden', modo === 'individual');
        document.getElementById('campos-individual').classList.toggle('hidden', modo === 'geral');
        if (modo === 'individual') {
            document.getElementById('status-gps').classList.remove('hidden');
            obterGps();
        } else {
            document.getElementById('status-gps').classList.add('hidden');
        }
    }

    function obterGps() {
        const btn = document.getElementById('status-gps');
        if (!navigator.geolocation) {
            btn.innerText = "❌ GPS não suportado";
            return;
        }

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude; 
            const lon = pos.coords.longitude;
            dadosLoc.hora = new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
            dadosLoc.link = `https://www.google.com/maps?q=${lat},${lon}`;
            
            let planta = null;
            pontosAlcoa.forEach(p => {
                const d = Math.sqrt(Math.pow(lat - p.lat, 2) + Math.pow(lon - p.lon, 2)) * 111320; // metros aprox.
                if (d <= 800) planta = p.nome;
            });

            if (planta) {
                dadosLoc.unidade = planta;
                dadosLoc.status = "Presente na Planta";
                btn.innerHTML = `✅ ${planta}<br>${dadosLoc.hora}`;
                btn.style.backgroundColor = "#075E54";
            } else {
                dadosLoc.unidade = "FORA DA PLANTA";
                dadosLoc.status = "Trabalho Externo / Ausente";
                btn.innerHTML = `🛑 FORA DA PLANTA<br>${dadosLoc.hora}`;
                btn.style.backgroundColor = "#d9534f";
            }
        }, (err) => {
            btn.innerText = "❌ Ative o GPS para continuar";
            btn.style.backgroundColor = "#333";
        }, { enableHighAccuracy: true });
    }

    function monitorar() {
        let f=0, a=0, j=0, s=0;
        equipe.forEach((_, i) => {
            const cb = document.getElementById(`check-${i}`);
            const sel = document.getElementById(`motivo-${i}`);
            if (!cb.checked) {
                sel.classList.remove('hidden');
                if (sel.value === "Férias") f++;
                else if (sel.value === "Atestado") a++;
                else if (sel.value === "Falta justificada") j++;
                else s++;
            } else { sel.classList.add('hidden'); }
        });
        document.getElementById('count-ferias').innerText = f;
        document.getElementById('count-atestado').innerText = a;
        document.getElementById('count-faltajust').innerText = j;
        document.getElementById('count-faltas').innerText = s;
    }

    function enviarWhatsapp() {
        const modo = document.getElementById('modo-envio').value;
        const data = new Date().toLocaleDateString('pt-BR');
        let msg = "";

        if (modo === "individual") {
            const nome = document.getElementById('select-individual').value;
            msg = `*RELATÓRIO DE FREQUÊNCIA INDIVIDUAL*\n\n` +
                  `👤 *Funcionário:* ${nome}\n` +
                  `📅 *Data:* ${data}\n` +
                  `⏰ *Hora:* ${dadosLoc.hora}\n\n` +
                  `🏢 *Unidade:* ${dadosLoc.unidade}\n` +
                  `📊 *Status:* ${dadosLoc.status}\n` +
                  `📍 *Local:* ${dadosLoc.link}`;
        } else {
            let planta = [], ausentes = [];
            equipe.forEach((nome, i) => {
                if (document.getElementById(`check-${i}`).checked) planta.push(`- _${nome}_`);
                else ausentes.push(`- _${nome}_ (*${document.getElementById(`motivo-${i}`).value}*)`);
            });

            msg = `*FREQUÊNCIA DIÁRIA TELEJUR*\n` +
                  `📅 *Data:* ${data}\n\n` +
                  `✅ *NA PLANTA (${planta.length}):*\n${planta.join('\n')}\n\n` +
                  `❌ *AUSÊNCIAS (${ausentes.length}):*\n${ausentes.join('\n') || "_Nenhuma_"}`;
        }
        window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(msg));
    }

    window.onload = carregarLista;
</script>
</body>
</html>
